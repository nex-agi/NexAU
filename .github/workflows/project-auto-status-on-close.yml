name: "Project: Auto set status on issue close"

on:
  issues:
    types: [closed]

permissions:
  contents: read

jobs:
  auto-status-on-close:
    runs-on: ubuntu-latest
    steps:
      - name: Set project status based on close reason
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          set -euo pipefail

          PROJECT_ID="PVT_kwDOCmnEdM4BQARn"
          STATUS_FIELD_ID="PVTSSF_lADOCmnEdM4BQARnzg-P8lI"
          DONE_OPTION_ID="1113ce28"
          CANCELLED_OPTION_ID="e25879b3"

          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"
          REPO_NAME="${{ github.repository }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          REASON="${{ github.event.issue.state_reason }}"

          echo "Issue #$ISSUE_NUM in $REPO_NAME closed as '$REASON': $ISSUE_TITLE"

          # Determine target status
          if [ "$REASON" = "not_planned" ] || [ "$REASON" = "duplicate" ]; then
            TARGET_STATUS="Cancelled"
            TARGET_OPTION_ID="$CANCELLED_OPTION_ID"
          else
            TARGET_STATUS="Done"
            TARGET_OPTION_ID="$DONE_OPTION_ID"
          fi

          echo "Target status: $TARGET_STATUS"

          find_item_via_issue() {
            gh api graphql -f query="
            {
              node(id: \"$ISSUE_NODE_ID\") {
                ... on Issue {
                  projectItems(first: 20) {
                    nodes {
                      id
                      project { id }
                    }
                  }
                }
              }
            }" | jq -r --arg project "$PROJECT_ID" '
              .data.node.projectItems.nodes[]?
              | select(.project.id == $project)
              | .id
            ' | head -n 1
          }

          find_item_via_project_scan() {
            local has_next=true
            local cursor=""
            local item_id=""

            while [ "$has_next" = "true" ] && [ -z "$item_id" ]; do
              if [ -z "$cursor" ]; then
                after_arg=""
              else
                after_arg=", after: \"$cursor\""
              fi

              response=$(gh api graphql -f query="
              {
                node(id: \"$PROJECT_ID\") {
                  ... on ProjectV2 {
                    items(first: 100${after_arg}) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            repository { nameWithOwner }
                          }
                        }
                      }
                    }
                  }
                }
              }")

              has_next=$(echo "$response" | jq -r '.data.node.items.pageInfo.hasNextPage')
              cursor=$(echo "$response" | jq -r '.data.node.items.pageInfo.endCursor')
              item_id=$(echo "$response" | jq -r --arg repo "$REPO_NAME" --arg num "$ISSUE_NUM" '
                .data.node.items.nodes[]
                | select(.content != null and (.content.number | tostring) == $num and .content.repository.nameWithOwner == $repo)
                | .id
              ' | head -n 1)
            done

            printf '%s' "$item_id"
          }

          ITEM_ID=""
          for attempt in 1 2 3 4 5; do
            ITEM_ID=$(find_item_via_issue || true)
            if [ -z "$ITEM_ID" ]; then
              ITEM_ID=$(find_item_via_project_scan || true)
            fi

            if [ -n "$ITEM_ID" ]; then
              break
            fi

            echo "Project item not visible yet (attempt $attempt/5), retrying in 3s..."
            sleep 3
          done

          if [ -z "$ITEM_ID" ]; then
            echo "Issue not found in project after retries — skipping."
            exit 0
          fi

          echo "Found project item: $ITEM_ID — setting Status to $TARGET_STATUS"

          gh api graphql -f query="
          mutation {
            updateProjectV2ItemFieldValue(input: {
              projectId: \"$PROJECT_ID\"
              itemId: \"$ITEM_ID\"
              fieldId: \"$STATUS_FIELD_ID\"
              value: { singleSelectOptionId: \"$TARGET_OPTION_ID\" }
            }) {
              projectV2Item { id }
            }
          }" > /dev/null

          echo "Done. Issue #$ISSUE_NUM status set to $TARGET_STATUS."
