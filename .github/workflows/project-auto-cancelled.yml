name: "Project: Auto set Cancelled on issue close (not planned / duplicate)"

on:
  issues:
    types: [closed]

permissions:
  contents: read

jobs:
  auto-cancelled:
    if: github.event.issue.state_reason == 'not_planned' || github.event.issue.state_reason == 'duplicate'
    runs-on: ubuntu-latest
    steps:
      - name: Set project status to Cancelled
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          set -euo pipefail

          PROJECT_ID="PVT_kwDOCmnEdM4BQARn"
          STATUS_FIELD_ID="PVTSSF_lADOCmnEdM4BQARnzg-P8lI"
          CANCELLED_OPTION_ID="e25879b3"

          REPO_NAME="${{ github.repository }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          REASON="${{ github.event.issue.state_reason }}"

          echo "Issue #$ISSUE_NUM in $REPO_NAME closed as '$REASON': $ISSUE_TITLE"

          HAS_NEXT=true
          CURSOR=""
          ITEM_ID=""

          while [ "$HAS_NEXT" = "true" ] && [ -z "$ITEM_ID" ]; do
            if [ -z "$CURSOR" ]; then
              AFTER_ARG=""
            else
              AFTER_ARG=", after: \"$CURSOR\""
            fi

            RESPONSE=$(gh api graphql -f query="
            {
              node(id: \"$PROJECT_ID\") {
                ... on ProjectV2 {
                  items(first: 100${AFTER_ARG}) {
                    pageInfo {
                      hasNextPage
                      endCursor
                    }
                    nodes {
                      id
                      content {
                        ... on Issue {
                          number
                          repository { nameWithOwner }
                        }
                      }
                    }
                  }
                }
              }
            }")

            HAS_NEXT=$(echo "$RESPONSE" | jq -r '.data.node.items.pageInfo.hasNextPage')
            CURSOR=$(echo "$RESPONSE" | jq -r '.data.node.items.pageInfo.endCursor')
            ITEM_ID=$(echo "$RESPONSE" | jq -r --arg repo "$REPO_NAME" --arg num "$ISSUE_NUM" '
              .data.node.items.nodes[]
              | select(.content != null and (.content.number | tostring) == $num and .content.repository.nameWithOwner == $repo)
              | .id
            ' | head -n 1)
          done

          if [ -z "$ITEM_ID" ]; then
            echo "Issue not found in project, skipping."
            exit 0
          fi

          echo "Found project item: $ITEM_ID — setting Status to Cancelled"

          gh api graphql -f query="
          mutation {
            updateProjectV2ItemFieldValue(input: {
              projectId: \"$PROJECT_ID\"
              itemId: \"$ITEM_ID\"
              fieldId: \"$STATUS_FIELD_ID\"
              value: { singleSelectOptionId: \"$CANCELLED_OPTION_ID\" }
            }) {
              projectV2Item { id }
            }
          }" > /dev/null

          echo "Done. Issue #$ISSUE_NUM status set to Cancelled."
