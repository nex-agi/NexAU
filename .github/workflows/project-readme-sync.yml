name: Project README sync

on:
  workflow_dispatch:
  schedule:
    # Friday 22:00 Asia/Shanghai = Friday 14:00 UTC
    - cron: '0 14 * * 5'

permissions:
  contents: read

jobs:
  sync-project-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify GitHub CLI auth
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: gh auth status

      - name: Generate latest Project README
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          python3 scripts/sync_project_readme.py > /tmp/project5-readme.md
          echo "Generated README size: $(wc -c < /tmp/project5-readme.md) bytes"

      - name: Fetch current Project README
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          gh project view 5 --owner china-qijizhifeng --format json --jq .readme > /tmp/project5-readme-current.md

      - name: Update Project README when changed
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          if cmp -s /tmp/project5-readme-current.md /tmp/project5-readme.md; then
            echo "No README changes detected."
            exit 0
          fi

          echo "README changed, updating project settings..."
          gh project edit 5 --owner china-qijizhifeng --readme "$(cat /tmp/project5-readme.md)"
          echo "Project README updated."
