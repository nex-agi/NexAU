type: workflow
version: "1"
name: human_case_review
description: Reusable human review subgraph for generated QA cases.

inputs:
  requirement:
    type: string
    description: Product requirement or release change under review.
  cases:
    type: array
    description: QA cases generated by the parent workflow.
  reviewer_hint:
    type: string
    description: Prompt shown to the human reviewer.

output_schema:
  type: object
  additionalProperties: false
  properties:
    approved:
      type: boolean
    cases:
      type: array
      minItems: 1
      items:
        type: object
    review_note:
      type: string
  required:
    - approved
    - cases
    - review_note

nodes:
  start:
    type: start
    output:
      requirement: "{{ inputs.requirement }}"
      cases: "{{ inputs.cases }}"
      reviewer_hint: "{{ inputs.reviewer_hint }}"

  review:
    type: human
    prompt: "{{ nodes.start.output.reviewer_hint }}"
    input:
      requirement: "{{ nodes.start.output.requirement }}"
      cases: "{{ nodes.start.output.cases }}"
    output_schema:
      type: object
      additionalProperties: false
      properties:
        approved:
          type: boolean
        cases:
          type: array
          minItems: 1
          items:
            type: object
        review_note:
          type: string
      required:
        - approved
        - cases
        - review_note

  finish:
    type: end
    output:
      approved: "{{ nodes.review.output.approved }}"
      cases: "{{ nodes.review.output.cases }}"
      review_note: "{{ nodes.review.output.review_note }}"

edges:
  start: review
  review: finish
