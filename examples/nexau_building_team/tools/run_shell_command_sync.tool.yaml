type: tool
name: run_shell_command
formatter: nexau.archs.tool.formatters.shell:format_run_shell_command_output
description: >-
  This tool executes a given shell command synchronously through the sandbox's
  active shell backend. On Windows the default backend is PowerShell/cmd, while
  Git Bash is used only when explicitly selected; on Unix-like systems the
  backend is bash-compatible. Use the command syntax for the active backend
  described in the Runtime Environment section of the system prompt. On Windows
  PowerShell backends, use PowerShell syntax. PowerShell here-strings are useful
  for simple multi-line content, but avoid single-quoted here-strings when content
  may contain a line beginning with `'@`. For exact UTF-8 file content without
  BOM, prefer .NET `WriteAllText` with `UTF8Encoding($false)`. Do not use Bash
  heredoc unless Git Bash is explicitly selected. All commands
  run in the foreground and must complete before returning. Use this
  for build steps, tests, one-off scripts, and commands that terminate.

  The following information is returned:

  Output: Combined stdout/stderr. Can be `(empty)` or partial on error.

  Exit Code: Only included if non-zero (command failed).

  Error: Only included if a process-level error occurred (e.g., spawn failure).

  Signal: Only included if process was terminated by a signal.
input_schema:
  type: object
  properties:
    command:
      type: string
      description: Exact command to execute with the active shell backend
    description:
      type: string
      description: >-
        Brief description of the command for the user. Be specific and concise.
        Ideally a single sentence. Can be up to 3 sentences for clarity. No line
        breaks.
    dir_path:
      type: string
      description: >-
        (OPTIONAL) The path of the directory to run the command in. If not
        provided, the project root directory is used. Must be a directory within
        the workspace and must already exist.
  required:
    - command
  additionalProperties: false
  $schema: http://json-schema.org/draft-07/schema#
