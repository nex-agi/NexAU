type: tool
name: read_visual_file
description: >-
  Reads image and video files, returning visual content for multimodal LLMs.
  Supports images (PNG, JPG, GIF, WEBP, SVG, BMP) and video files (MP4, AVI,
  MOV, MKV, WEBM, FLV, WMV, M4V). Video files are processed by extracting
  key frames via ffmpeg. For text files, use the read_file tool instead.
input_schema:
  type: object
  properties:
    file_path:
      type: string
      description: The path to the image or video file to read.
  required:
    - file_path
  additionalProperties: false
  $schema: http://json-schema.org/draft-07/schema#
