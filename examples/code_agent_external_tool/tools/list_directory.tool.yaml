type: tool
name: list_directory
kind: external
description: >-
  Lists the names of files and subdirectories directly within a specified
  directory path. Can optionally ignore entries matching provided glob patterns.
input_schema:
  type: object
  properties:
    dir_path:
      type: string
      description: The path to the directory to list
    ignore:
      type: array
      items:
        type: string
      description: List of glob patterns to ignore
    show_hidden:
      type: boolean
      description: >-
        Optional: Whether to include hidden files and directories (starting
        with '.'). Defaults to true.
  required:
    - dir_path
  additionalProperties: false
  $schema: http://json-schema.org/draft-07/schema#
